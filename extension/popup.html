<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meaningful</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        box-sizing: border-box;
        min-width: 240px;
        margin: 0;
        padding: 16px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 16px;
        line-height: 1.3;
      }

      p {
        margin: 0 0 14px;
        color: #475569;
        font-size: 13px;
        line-height: 1.45;
      }

      label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
        font-size: 14px;
      }

      .site {
        margin-bottom: 12px;
        overflow: hidden;
        border-radius: 8px;
        padding: 8px 10px;
        background: rgba(37, 99, 235, 0.1);
        color: #1e40af;
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      input {
        width: 18px;
        height: 18px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      @media (prefers-color-scheme: dark) {
        p {
          color: #cbd5e1;
        }

        .site {
          color: #bfdbfe;
        }
      }
    </style>
  </head>
  <body>
    <h1>Meaningful</h1>
    <div class="site" data-site>Current site</div>
    <p data-status>Loading preferences...</p>

    <label>
      Enabled on this site
      <input type="checkbox" data-enabled-toggle>
    </label>

    <button type="button" data-pause-button>Pause temporarily</button>
    <script src="popup.js"></script>
  </body>
</html>
